<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://code.highcharts.com/10/highcharts.js"></script>
    <script src="https://code.highcharts.com/10/highcharts-more.js"></script>
    <script src="https://code.highcharts.com/10/modules/datagrouping.js"></script>
    <script src="https://code.highcharts.com/10/modules/windbarb.js"></script>
    <script src="https://code.highcharts.com/10/modules/pattern-fill.js"></script>
    <script src="https://code.highcharts.com/10/modules/data.js"></script>
    <script src="https://code.highcharts.com/10/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/10/modules/accessibility.js"></script>
    <script src="/static/script.js"></script> 
    <script src="/static/chart-range.js"></script>
    <script src="/static/chart-hourly.js"></script>
</head>

<body>
    <div class="container">
        <div class="container-header"> <img src="/static/Images/banner.jpg">
            <h1 class="weather-search-header">Weather Search</h1>
            <p>Fill out the form to get weather info !</p>
        </div>
        <form id="weather-form">
            <div class="form-content"> 
                <label for="street-name">Street:<span class=required>*</span></label>
                <input type="text" id="street-name" name="street-name" required=""> 
            </div>
            <div class="form-row">
                <div class="city-input">
                    <label for="city-name">City:<span class=required>*</span></label>
                    <input type="text" id="city-name" name="city-name" required="" style="width:220px;">
                </div>
                <div class="state-input">
                    <div action="/get_weather" method="GET">
                        <label for="state-name">State:<span class=required>*</span></label>
                        <select id="state-name" name="state-name" required="" style="width:230px;">
                            <option value="" disabled selected>Select your state</option>
                            <option value="AL">Alabama</option>
                            <option value="AK">Alaska</option>
                            <option value="AZ">Arizona</option>
                            <option value="AR">Arkansas</option>
                            <option value="CA">California</option>
                            <option value="CO">Colorado</option>
                            <option value="CT">Connecticut</option>
                            <option value="DE">Delaware</option>
                            <option value="DC">District Of Columbia</option>
                            <option value="FL">Florida</option>
                            <option value="GA">Georgia</option>
                            <option value="HI">Hawaii</option>
                            <option value="ID">Idaho</option>
                            <option value="IL">Illinois</option>
                            <option value="IN">Indiana</option>
                            <option value="IA">Iowa</option>
                            <option value="KS">Kansas</option>
                            <option value="KY">Kentucky</option>
                            <option value="LA">Louisiana</option>
                            <option value="ME">Maine</option>
                            <option value="MD">Maryland</option>
                            <option value="MA">Massachusetts</option>
                            <option value="MI">Michigan</option>
                            <option value="MN">Minnesota</option>
                            <option value="MS">Mississippi</option>
                            <option value="MO">Missouri</option>
                            <option value="MT">Montana</option>
                            <option value="NE">Nebraska</option>
                            <option value="NV">Nevada</option>
                            <option value="NH">New Hampshire</option>
                            <option value="NJ">New Jersey</option>
                            <option value="NM">New Mexico</option>
                            <option value="NY">New York</option>
                            <option value="NC">North Carolina</option>
                            <option value="ND">North Dakota</option>
                            <option value="OH">Ohio</option>
                            <option value="OK">Oklahoma</option>
                            <option value="OR">Oregon</option>
                            <option value="PA">Pennsylvania</option>
                            <option value="RI">Rhode Island</option>
                            <option value="SC">South Carolina</option>
                            <option value="SD">South Dakota</option>
                            <option value="TN">Tennessee</option>
                            <option value="TX">Texas</option>
                            <option value="UT">Utah</option>
                            <option value="VT">Vermont</option>
                            <option value="VA">Virginia</option>
                            <option value="WA">Washington</option>
                            <option value="WV">West Virginia</option>
                            <option value="WI">Wisconsin</option>
                            <option value="WY">Wyoming</option>
                        </select>
                    </div>
                </div>
            </div> 
            <div class="form-check">
                <hr class="line-divider">
                <label for="auto-detect">Want us to auto-detect your location? Check here</label>
                <input type="checkbox" id="auto-detect" name="auto-detect">
            </div>
            <button type="submit" id="submit-button">SUBMIT</button>
            <button type="button" id="clear-button">CLEAR</button>
        </form>
    </div>

    <div id="current-weather" class="weather-card">
        <h2>Current Daily Weather Details</h2>
        <div id="daily-weather">
            <img id="current-weather-icon" src="" alt="">
            <p id="current-location"></p>
            <p id="current-temperature"></p>
            <p id="current-humidity"></p>
            <p id="current-pressure"></p>
            <p id="current-wind-speed"></p>
            <p id="current-visibility"></p>
            <p id="current-cloud-cover"></p>
            <p id="current-uv-level"></p>
            <!-- <div class="current-day">
                <h3>Date: <span id="date1"></span></h3>
                <p>High: <span id="high1"></span></p>
                <p>Low: <span id="low1"></span></p>
            </div> -->
        </div>
    </div>

    <!-- <div></div>
        <h2>Weather Table</h2>
        <div id="weather-table">
            <canvas id="temp-chart"></canvas>
            <canvas id="precipitation-chart"></canvas>
        </div>
    </div> -->

    <table id="weather-table">
        <!-- <thead>
            <tr>
                <th>Date</th>
                <th>Status</th>
                <th>Temp High</th>
                <th>Temp Low</th>
            </tr>
        </thead>
        <tbody>
            
        </tbody> -->
    </table>

    <div id="detailed-weather">
        <h2 id="detailed-header">Daily Weather Details</h2>
        <!-- <div id="detailed-content-new">
            <table>
                <tbody>
                    <tr style="background-color: rgba(0,0,0,0)">
                        <td>Hello</td>
                    </tr>
                </tbody>
            </table>
        </div> -->
        <div id="detailed-content">
            <table>
                <tbody>
                    <tr>
                        <td class="detailed-content-date" style="padding-bottom: 0; padding-left: 19px; width:100%;">Wed Mon Oct 16, 2024 </td>
                    </tr>
                    <tr>
                        <td class="detailed-content-weather-status" style="padding-bottom: 0; padding-top: 0; padding-left: 8px;">Clear </td>
                        <td class="detailed-content-weather-icon" style="padding-bottom: 0; padding-top: 0;"> <img src=/static/Images/WeatherIcons/clear_day.svg height="60" width="60"> </td>
                    </tr>
                    <tr>
                        <td class="detailed-content-weather-high-low-temp" style="padding-bottom: 16px; padding-top: 0; padding-right: 4px; padding-left: 18px;">80.0°F/61.0°F </td>
                    </tr>
                </tbody>
                <tbody>
                    <tr>
                        <td class="detailed-content-left" style="font-size: 16px; color: white; text-align: right; width: 50%; padding:0; padding-top:40px;"> Precipitation:</td>
                        <td class="detailed-content-precipitation-type" style="font-size:16px; color: white; text-align:left; padding:0; padding-left:6px; padding-top:40px;">N/A </td>
                    </tr>
                    <tr>
                        <td class="detailed-content-left" style="color: white; text-align: right; width: 50%; font-size: 16px; text-align: right; width: 50%; padding:0; padding-top:8px;"> Chance of Rain:</td>
                        <td class="detailed-content-precipitation-prob" style="text-align: left; font-size: 16px; color: white; width: 50%; padding:0; padding-left:6px; padding-top:8px;"> 1% </td>
                    </tr>
                    <tr>
                        <td class="detailed-content-left" style="color: white; text-align: right; width: 50%; font-size: 16px; text-align: right; width: 50%; padding:0; padding-top:8px;"> Wind Speed:</td>
                        <td class="detailed-content-wind-speed" style="text-align: left; font-size: 16px; color: white; width: 50%; padding:0; padding-left:6px; padding-top:8px;">1.5 mph </td>
                    </tr>
                    <tr>
                        <td class="detailed-content-left" style="color: white; text-align: right; width: 50%; font-size: 16px; text-align: right; width: 50%; padding:0; padding-top:8px;">  Humidity:</td>
                        <td class="detailed-content-humidity" style="text-align: left; font-size: 16px; color: white; width: 50%; padding:0; padding-left:6px; padding-top:8px;">51.2% </td>
                    </tr>
                    <tr>
                        <td class="detailed-content-left" style="color: white; text-align: right; width: 50%; font-size: 16px; text-align: right; width: 50%; padding:0; padding-top:8px;"> Visibility:</td>
                        <td class="detailed-content-visibility" style="text-align: left; font-size: 16px; color: white; width: 50%; padding:0; padding-left:6px; padding-top:8px;">1 mi </td>
                    </tr>
                    <tr>
                        <td class="detailed-content-left" style="color: white; text-align: right; width: 50%; font-size: 16px; text-align: right; width: 50%; padding: 0; padding-bottom:20px; padding-top:8px;"> Sunrise/Sunset:</td>
                        <td class="detailed-content-sunrise-sunset" style="text-align: left; font-size: 16px; color: white; width: 50%; padding-bottom:20px; padding-left:6px; padding-top:8px;">5:10AM/6:35PM </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div id="weather-chart-content" style="display: none;">
        <table>
            <tr style="background-color: rgba(0,0,0,0)">
                <td><h2>Weather Charts</h2></td>
            </tr>
            <tr style="background-color: rgba(0,0,0,0)">
                <td id="weather-chart-click-me"><img src="/static/Images/point-down-512.png" width="32" height="32"></td>
            </tr>
        </table>
        <div id="weather-chart-range" style="display:none;"></div>
        <div id="weather-chart-hourly" style="display:none;"></div>
    </div>

</body>

</html>
